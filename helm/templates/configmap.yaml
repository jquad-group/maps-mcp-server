apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chart.fullname" . }}-config
  namespace: {{ include "chart.namespace" . }}
  labels:
    app.kubernetes.io/component: config
    {{- include "chart.labels" . | nindent 4 }}
data:
{{- range $key, $val := .Values.configMap.data }}
  {{ $key }}: {{ $val | quote }}
{{- end }}
