# Production overlay for Maps MCP Server.
# Adds the Harbor image registry prefix and configures image pull secrets.
#
# Prerequisites:
#   1. External Secrets Operator installed
#   2. ClusterSecretStore named "openbao-cluster-store" configured
#   3. Harbor credentials stored in OpenBao at path: jquad/production/harbor
#
# Usage:
#   kubectl apply -k k8s/overlays/production

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: teams

resources:
- ../../base
- externalsecret.yaml

images:
- name: harbor.jquad.rocks/library/jquad-agent/jquad-agent-maps-mcp-server
  newTag: latest

patches:
- patch: |-
    - op: add
      path: /spec/template/spec/imagePullSecrets
      value:
      - name: regcred-maps-mcp-server
  target:
    kind: Deployment
    name: maps-mcp-server

commonLabels:
  environment: production
