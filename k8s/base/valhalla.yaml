# Valhalla routing engine — isochrones, time/distance matrix, routes.
#
# Uses the gisops/valhalla image which auto-builds routing tiles from an OSM
# PBF on first boot when /data/valhalla is empty. Download the Germany extract
# once into the PVC:
#
#   # from a pod with the valhalla-data PVC mounted at /data/valhalla
#   wget -O /data/valhalla/germany-latest.osm.pbf \
#     https://download.geofabrik.de/europe/germany-latest.osm.pbf
#
# Then (re)start the Valhalla pod: it builds tiles (10-30 min for Germany)
# and serves on port 8002. See README.md for the full procedure.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: valhalla
  namespace: teams
  labels:
    app.kubernetes.io/name: valhalla
    app.kubernetes.io/component: routing-engine
    app.kubernetes.io/part-of: jquad-agent
spec:
  replicas: 1
  strategy:
    # Valhalla rebuilds tiles on boot; don't thrash during updates.
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: valhalla
  template:
    metadata:
      labels:
        app.kubernetes.io/name: valhalla
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.present
                operator: NotIn
                values:
                - "true"
      containers:
      - name: valhalla
        image: gisops/valhalla:latest
        imagePullPolicy: IfNotPresent
        # Tell the entrypoint to use the server tar tiles and which config
        # tunables to apply. The gisops image reads these env vars.
        env:
        - name: serve_tiles
          value: "true"
        - name: build_elevation
          value: "false"
        - name: force_rebuild
          value: "false"
        ports:
        - containerPort: 8002
          name: http
          protocol: TCP
        volumeMounts:
        - name: valhalla-data
          mountPath: /data/valhalla
        resources:
          # Tile building peaks ~3-4 GB; steady-state serving is ~1-2 GB.
          requests:
            memory: "1Gi"
            cpu: "250m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /status
            port: 8002
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /status
            port: 8002
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: valhalla-data
        persistentVolumeClaim:
          claimName: valhalla-data
---
apiVersion: v1
kind: Service
metadata:
  name: valhalla
  namespace: teams
  labels:
    app.kubernetes.io/name: valhalla
    app.kubernetes.io/component: routing-engine
spec:
  type: ClusterIP
  ports:
  - port: 8002
    targetPort: 8002
    protocol: TCP
    name: http
  selector:
    app.kubernetes.io/name: valhalla
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: valhalla-data
  namespace: teams
  labels:
    app.kubernetes.io/name: valhalla
    app.kubernetes.io/component: storage
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      # Germany PBF (~4 GB) + built tiles (~8-12 GB).
      storage: 20Gi
