apiVersion: v1
kind: Secret
metadata:
  name: maps-mcp-secret
  namespace: teams
  labels:
    app.kubernetes.io/name: maps-mcp-server
    app.kubernetes.io/component: secret
type: Opaque
stringData:
  # No external API keys required — Valhalla and Nominatim are self-hosted
  # and cluster-internal. This Secret exists for symmetry with the sibling
  # servers and to hold the optional Keycloak client secret if JWT
  # validation is enabled.
  KEYCLOAK_CLIENT_SECRET: "change-me-if-keycloak-enabled"
